name: Westbury Daily Post

# Posts one Westbury Collections post per day. You can also run it by hand from
# the Actions tab. When you run it by hand you can choose to post immediately.
#
# The ONLY secret you must set is BUFFER_API_KEY. The channel is found
# automatically. (Optional: BUFFER_CHANNEL_IDS to force a specific channel.)

on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC = 9am UK (British Summer Time)
  workflow_dispatch:
    inputs:
      mode:
        description: "How to publish"
        type: choice
        default: shareNow
        options:
          - shareNow # post immediately
          - addToQueue # add to your Buffer queue (posts at your scheduled times)
      dry_run:
        description: "Test only — build everything but do NOT post"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  daily-post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Westbury-Automation/automation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install --no-audit --no-fund

      - name: Generate caption + image
        env:
          IMAGE_PROVIDER: local
          IMAGE_SIZE: portrait
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run generate

      - name: Commit the generated image (gives Buffer a public URL)
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Westbury-Automation/output/
          if git diff --cached --quiet; then
            echo "No image changes to commit."
            exit 0
          fi
          git commit -m "Daily post image $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # Another run (or a merge) may have moved the branch. Rebase onto the
          # latest remote and retry, so a push race never fails the workflow.
          for i in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            if git rebase -X theirs "origin/$BRANCH"; then
              if git push origin "HEAD:$BRANCH"; then
                echo "Pushed image."
                exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "Push race — retry $i…"
            sleep $((i * 3))
          done
          echo "Could not push the image after several retries."
          exit 1

      - name: Publish to Buffer
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_IDS: ${{ secrets.BUFFER_CHANNEL_IDS }}
          # Manual runs use the chosen mode; the daily schedule uses addToQueue.
          BUFFER_POST_MODE: ${{ inputs.mode || 'addToQueue' }}
          # Manual "dry_run" tickbox, or a DRY_RUN secret, disables real posting.
          DRY_RUN: ${{ inputs.dry_run || secrets.DRY_RUN }}
        run: npm run publish
