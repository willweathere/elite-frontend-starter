name: Westbury Daily Post

# Posts one Westbury Collections post per day. You can also run it by hand from
# the Actions tab (the "Run workflow" button) to test it right now.
#
# The ONLY secret you must set is BUFFER_API_KEY. The channel is found
# automatically. (Optional: BUFFER_CHANNEL_IDS to force a specific channel,
# DRY_RUN=true to test without actually posting.)

on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC = 9am UK (British Summer Time)
  workflow_dispatch: {} # manual "Run workflow" button

permissions:
  contents: write

jobs:
  daily-post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Westbury-Automation/automation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --no-audit --no-fund

      - name: Generate caption + image
        env:
          IMAGE_PROVIDER: local
          IMAGE_SIZE: portrait
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run generate

      - name: Commit the generated image (gives Buffer a public URL)
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Westbury-Automation/output/
          git commit -m "Daily post image $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push

      - name: Publish to Buffer
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_IDS: ${{ secrets.BUFFER_CHANNEL_IDS }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
        run: npm run publish
