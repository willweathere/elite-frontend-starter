name: Find Buffer Channels

# A one-off helper. Click "Run workflow" and open the log to see the Buffer
# channels connected to your account (name + id). You do NOT normally need this
# — the daily post finds the channel automatically — but it is handy to confirm
# your key works and to see what is connected.

on:
  workflow_dispatch: {}

jobs:
  find-channels:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Westbury-Automation/automation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - name: List Buffer channels
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
        run: npm run channels
