name: Westbury Daily Post

# ---------------------------------------------------------------------------
# Runs once a day and can also be triggered by hand for testing.
#
#  - Generates today's caption + branded image
#  - Commits the image so it has a public URL Buffer can fetch
#  - Sends the post to Buffer
#
# All secrets live in GitHub Secrets. They are never printed or committed.
# ---------------------------------------------------------------------------

on:
  schedule:
    # Cron is always in UTC. 08:00 UTC = 9am UK during British Summer Time
    # (late Mar–late Oct) and 8am UK in winter. Change to "0 9 * * *" if you
    # prefer 9am during the winter months instead.
    - cron: "0 8 * * *"
  workflow_dispatch: {} # lets you run it manually from the Actions tab

# The job needs to push the generated image back to the repo.
permissions:
  contents: write

jobs:
  daily-post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Westbury-Automation/automation

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate caption + image
        env:
          IMAGE_PROVIDER: local # swap later without touching the workflow
          IMAGE_SIZE: portrait
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run generate

      - name: Commit the generated image (gives Buffer a public URL)
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Westbury-Automation/output/
          git commit -m "Daily post image $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push

      - name: Publish to Buffer
        env:
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_IDS: ${{ secrets.BUFFER_CHANNEL_IDS }}
          # Set DRY_RUN to "true" in the Actions inputs/secrets to test without posting.
          DRY_RUN: ${{ secrets.DRY_RUN }}
        run: npm run publish
